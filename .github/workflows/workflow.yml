name: Publish g-ocr to PyPI

# Baut das Paket und veröffentlicht es auf PyPI via Trusted Publishing (OIDC) —
# kein API-Token nötig. Läuft beim Erstellen eines GitHub-Releases (oder manuell).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Muss zum Environment-Namen im PyPI Trusted-Publisher passen:
    environment: pypi
    permissions:
      id-token: write   # OIDC für Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
